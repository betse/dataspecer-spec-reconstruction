<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Docs View – Spec Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'Inter', 'sans-serif'] },
          colors: {
            primary: { 50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95' },
            teal: { 550: '#0d9488' }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #f3f4f6;
      --panel: rgba(255, 255, 255, 0.85);
      --panel-2: #ffffff;
      --border: rgba(255, 255, 255, 0.5);
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #7c3aed;
      --primary-soft: #ede9fe;
      --accent: #0d9488;
      --accent-soft: #ccfbf1;
      --chip: #f3f4f6;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }

    body {
      margin: 0;
      font-family: 'Poppins', 'Inter', sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #fafafa 0%, #f3f4f6 100%);
      height: 100%;
    }

    html {
      height: 100%;
      box-sizing: border-box;
    }

    *,
    *::before,
    *::after {
      box-sizing: inherit;
    }

    .app {
      height: calc(100vh - 64px);
      display: grid;
      grid-template-columns: 320px 1fr 340px;
      gap: 18px;
      padding: 18px;
    }

    .panel {
      background: var(--panel);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 10px 24px rgba(139, 92, 246, 0.05);
      min-height: 0;
      overflow: hidden;
    }

    .left,
    .right {
      display: flex;
      flex-direction: column;
    }

    .panel-scroll {
      padding: 18px;
      overflow: auto;
      height: 100%;
    }

    .section+.section {
      margin-top: 18px
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .spec-header {
      padding: 18px 18px 0;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .spec-title {
      margin: 14px 0 4px;
      font-size: 28px;
      line-height: 1.1;
    }

    .spec-sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .primer-card {
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 18px;
      padding: 14px;
    }

    .small-note {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .toggle {
      padding: 9px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
    }

    .toggle.active {
      border-color: #c7d2fe;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
    }

    .class-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .class-item {
      width: 100%;
      text-align: left;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
      transition: .15s ease;
    }

    .class-item:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(15, 23, 42, .05);
    }

    .class-item.active {
      border-color: #c7d2fe;
      background: linear-gradient(180deg, #f7f8ff 0%, #eef2ff 100%);
    }

    .class-item strong {
      display: block;
      font-size: 14px
    }

    .class-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px
    }

    .main {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .toolbar {
      padding: 18px 18px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .search {
      flex: 1 1 320px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }

    .search input {
      border: none;
      outline: none;
      width: 100%;
      font-size: 14px;
      background: transparent;
      color: var(--text);
    }

    .context {
      margin: 16px 18px 0;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .breadcrumb {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .context-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .context-title h2 {
      margin: 0;
      font-size: 24px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }

    .context-copy {
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .main-content {
      padding: 18px;
      overflow: auto;
      min-height: 0;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #fafbff;
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: top;
      font-size: 14px;
    }

    tbody tr {
      cursor: pointer;
      transition: .12s ease;
    }

    tbody tr:hover {
      background: #fafcff
    }

    tbody tr.active {
      background: #f6f8ff
    }

    .prop-title {
      font-weight: 700;
      margin-bottom: 4px
    }

    .prop-sub {
      color: var(--muted);
      font-size: 12px
    }

    .tag {
      display: inline-flex;
      padding: 5px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #f8fafc;
      border: 1px solid var(--border);
      color: #334155;
    }

    .req-mandatory {
      background: #ecfdf5;
      color: #047857;
      border-color: #bbf7d0
    }

    .req-recommended {
      background: #fffbeb;
      color: #b45309;
      border-color: #fde68a
    }

    .req-optional {
      background: #f8fafc;
      color: #475569
    }

    .type-literal {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe
    }

    .type-object {
      background: #f5f3ff;
      color: #6d28d9;
      border-color: #ddd6fe
    }

    .code-wrap {
      padding: 18px;
    }

    pre {
      margin: 0;
      padding: 18px;
      border-radius: 16px;
      background: #0f172a;
      color: #e2e8f0;
      overflow: auto;
      font-size: 13px !important;
      line-height: 1.6;
    }

    .detail-header {
      padding: 18px 18px 0;
    }

    .detail-body {
      padding: 18px;
      overflow: auto;
    }

    .detail-card {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .detail-card h3,
    .detail-card h4 {
      margin: 0 0 8px;
    }

    .kv {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 8px 10px;
      font-size: 14px;
    }

    .kv .k {
      color: var(--muted)
    }

    .list {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
    }

    .nav-link {
      display: block;
      width: 100%;
      text-align: left;
      margin-top: 8px;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
    }

    .muted {
      color: var(--muted)
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 1280px) {
      .app {
        grid-template-columns: 280px 1fr 320px;
      }
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        height: auto;
        min-height: calc(100vh - 64px);
      }

      .panel {
        min-height: 320px
      }
    }
  </style>
  <script src="docs_data.js"></script>
</head>

<body>
  <!-- Navigation -->
  <nav class="sticky top-0 z-50 border-b border-gray-200/50"
    style="background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);">
    <div class="max-w-full mx-auto px-6">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-8">
          <div class="flex items-center gap-3">
            <div
              class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary-600 to-primary-800 flex items-center justify-center text-white font-bold text-sm">
              DS
            </div>
            <span
              class="text-xl font-bold bg-gradient-to-r from-primary-700 to-primary-900 bg-clip-text text-transparent cursor-pointer"
              onclick="window.location.href='index.html'">
              Spec Explorer
            </span>
          </div>

          <div class="hidden md:flex items-center gap-1 bg-gray-100/50 rounded-lg p-1">
            <button class="px-4 py-2 rounded-md text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors"
              onclick="window.location.href='index.html'">
              <i class="fas fa-compass mr-2"></i>Browse
            </button>
            <button class="px-4 py-2 rounded-md text-sm font-medium bg-white text-primary-600 shadow-sm"
              onclick="window.location.href='docs-view.html'">
              <i class="fas fa-book mr-2"></i>Docs
            </button>
          </div>
        </div>

        <div class="flex items-center gap-4">
          <button
            class="w-9 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 flex items-center justify-center transition-colors">
            <i class="fas fa-cog text-gray-600"></i>
          </button>
          <div
            class="w-9 h-9 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center text-white text-sm font-medium">
            JD
          </div>
        </div>
      </div>
    </div>
  </nav>
  <div class="app">
    <aside class="panel left">
      <div class="spec-header">
        <!-- <div class="eyebrow">Documentation View</div> -->
        <h1 class="spec-title" id="specTitle"></h1>
        <div class="spec-sub" id="specDescription"></div>
      </div>
      <div class="panel-scroll">
        <section class="section">
          <div class="section-title">Primer</div>
          <div class="primer-card bg-gradient-to-br from-primary-50 to-white shadow-sm border border-primary-100">
            <div class="primer-classes flex flex-col gap-2 mb-3" id="primerClasses"></div>

          </div>
        </section>

        <section class="section">
          <div class="section-title">Filters</div>
          <div class="toggle-row" id="requirementFilters"></div>
          <div style="height:10px"></div>
          <div class="toggle-row" id="typeFilters"></div>
        </section>

        <section class="section">
          <div class="section-title flex justify-between items-center cursor-pointer" onclick="toggleClasses()">Classes
            <i id="classesToggleIcon" class="fas fa-chevron-up"></i>
          </div>
          <div class="class-list transition-all duration-300 overflow-hidden" id="classList"></div>
        </section>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <div class="search">
          <span class="muted">⌕</span>
          <input id="searchInput" type="text" placeholder="Search classes and properties" />
        </div>
      </div>

      <section class="context">
        <div class="breadcrumb" id="activeContext"></div>
        <div class="context-title">
          <h2 id="classTitle"></h2>
          <span class="badge" id="classBadge"></span>
        </div>
        <div class="context-copy" id="classDefinition"></div>
      </section>

      <section class="main-content">
        <div class="tabs mb-4 flex gap-2">
          <button class="tab active px-4 py-2 rounded-lg border bg-white shadow-sm font-medium text-sm text-gray-600"
            data-tab="detail">Detail List View</button>
          <button class="tab px-4 py-2 rounded-lg border bg-white shadow-sm font-medium text-sm text-gray-600"
            data-tab="code">Code View</button>
        </div>
        <div class="card" id="detailView"></div>
        <div class="card" id="codeView" style="display:none"></div>
      </section>
    </main>

    <aside class="panel right">
      <div class="detail-header">
        <div class="section-title">Property Detail</div>
      </div>
      <div class="detail-body">
        <div id="propertyDetail"></div>

        <section class="section">
          <div class="section-title">Next View</div>
          <button class="nav-link flex items-center gap-2 hover:border-primary-300 transition-colors"
            id="graphButton"><i class="fas fa-project-diagram text-purple-500 w-5 text-center"></i> Open Graph
            View</button>
          <button class="nav-link flex items-center gap-2 hover:border-primary-300 transition-colors" id="devButton"
            onclick="alert('Developer View is coming soon!')"><i class="fas fa-code text-gray-500 w-5 text-center"></i>
            Developer View</button>
        </section>
      </div>
    </aside>
  </div>

  <script>
    let DATA;

    const primerIds = ["catalog", "dataset", "distribution"];
    let selectedClassId;
    let selectedPropertyId = null;
    let activeTab = "detail";
    const filters = {
      requirements: new Set(),
      types: new Set(),
      search: ""
    };

    const requirementOptions = [
      { id: "mandatory", label: "Mandatory" },
      { id: "recommended", label: "Recommended" },
      { id: "optional", label: "Optional" }
    ];
    const typeOptions = [
      { id: "literal", label: "Literal" },
      { id: "object", label: "Object" }
    ];

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, s => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s]));
    }

    function getSelectedClass() {
      return DATA.classes.find(c => c.id === selectedClassId) || DATA.classes[0];
    }

    function getVisibleProperties(cls) {
      let props = [...(cls.properties || [])];
      const q = filters.search.trim().toLowerCase();

      if (filters.requirements.size) {
        props = props.filter(p => filters.requirements.has((p.requirement || "optional").toLowerCase()));
      }
      if (filters.types.size) {
        props = props.filter(p => filters.types.has((p.type || "").toLowerCase()));
      }
      if (q) {
        props = props.filter(p =>
          [p.label, p.definition, p.range, p.domain, p.usageNote, p.iri]
            .filter(Boolean)
            .some(v => v.toLowerCase().includes(q))
        );
      }
      return props;
    }

    function computeClassMeta(cls) {
      const count = cls.properties?.length || 0;
      const objectCount = (cls.properties || []).filter(p => p.type === "object").length;
      return `${count} properties · ${objectCount} object links`;
    }

    function renderSpecHeader() {
      document.getElementById("specTitle").textContent = DATA.specification.title;
      document.getElementById("specDescription").textContent = DATA.specification.description || "";
    }

    function renderPrimer() {
      const el = document.getElementById("primerClasses");
      el.innerHTML = "";
      primerIds
        .map(id => DATA.classes.find(c => c.id === id))
        .filter(Boolean)
        .forEach(cls => {
          const btn = document.createElement("button");
          btn.className = "w-full text-left px-4 py-3 rounded-xl border transition-all flex items-center justify-between " +
            (cls.id === selectedClassId
              ? "bg-primary-50 border-primary-300 text-primary-700 shadow-sm font-medium"
              : "bg-white border-gray-200 text-gray-600 hover:border-primary-200 hover:bg-gray-50");
          btn.innerHTML = `<span class="flex items-center gap-2"><i class="fas ${cls.label === 'Catalog' ? 'fa-book' : cls.label === 'Dataset' ? 'fa-table' : 'fa-file-alt'} w-5 text-center"></i> ${escapeHtml(cls.label)}</span> <i class="fas fa-chevron-right text-xs opacity-50"></i>`;
          btn.onclick = () => {
            selectedClassId = cls.id;
            selectedPropertyId = null;
            renderAll();
          };
          el.appendChild(btn);
        });
    }

    function renderFilters() {
      const reqEl = document.getElementById("requirementFilters");
      reqEl.innerHTML = "";
      requirementOptions.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "toggle" + (filters.requirements.has(opt.id) ? " active" : "");
        btn.textContent = opt.label;
        btn.onclick = () => {
          if (filters.requirements.has(opt.id)) filters.requirements.delete(opt.id);
          else filters.requirements.add(opt.id);
          selectedPropertyId = null;
          renderAll();
        };
        reqEl.appendChild(btn);
      });

      const typeEl = document.getElementById("typeFilters");
      typeEl.innerHTML = "";
      typeOptions.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "toggle" + (filters.types.has(opt.id) ? " active" : "");
        btn.textContent = opt.label;
        btn.onclick = () => {
          if (filters.types.has(opt.id)) filters.types.delete(opt.id);
          else filters.types.add(opt.id);
          selectedPropertyId = null;
          renderAll();
        };
        typeEl.appendChild(btn);
      });
    }

    function renderClassList() {
      const q = filters.search.trim().toLowerCase();
      const list = document.getElementById("classList");
      list.innerHTML = "";
      let classes = DATA.classes;
      if (q) {
        classes = classes.filter(c =>
          [c.label, c.definition, c.iri]
            .filter(Boolean)
            .some(v => v.toLowerCase().includes(q)) ||
          (c.properties || []).some(p => [p.label, p.definition, p.iri].filter(Boolean).some(v => v.toLowerCase().includes(q)))
        );
      }
      classes.forEach(cls => {
        const btn = document.createElement("button");
        btn.className = "class-item" + (cls.id === selectedClassId ? " active" : "");
        btn.innerHTML = `<strong>${escapeHtml(cls.label)}</strong><div class="class-meta">${escapeHtml(computeClassMeta(cls))}</div>`;
        btn.onclick = () => {
          selectedClassId = cls.id;
          selectedPropertyId = null;
          renderAll();
        };
        list.appendChild(btn);
      });
    }

    function renderContext() {
      const cls = getSelectedClass();
      const source = cls.source?.from ? `Inherited from ${cls.source.from}` : "Local class profile";
      document.getElementById("activeContext").textContent = `${DATA.specification.title} → ${cls.label}`;
      document.getElementById("classTitle").textContent = cls.label;
      document.getElementById("classBadge").textContent = source;
      document.getElementById("classDefinition").textContent = cls.definition || cls.usageNote || "No definition available.";
    }

    function requirementTag(req) {
      const value = (req || "optional").toLowerCase();
      const cls = value === "mandatory" ? "req-mandatory" : value === "recommended" ? "req-recommended" : "req-optional";
      return `<span class="tag ${cls}">${escapeHtml(req || "optional")}</span>`;
    }

    function typeTag(type) {
      const value = (type || "").toLowerCase();
      const cls = value === "literal" ? "type-literal" : "type-object";
      return `<span class="tag ${cls}">${escapeHtml(type || "object")}</span>`;
    }

    function renderDetailView() {
      const cls = getSelectedClass();
      const props = getVisibleProperties(cls);
      const container = document.getElementById("detailView");

      if (!props.length) {
        container.innerHTML = `<div class="empty">No properties match the current filters.</div>`;
        return;
      }

      const rows = props.map(p => `
    <tr data-prop="${escapeHtml(p.id)}" class="${p.id === selectedPropertyId ? 'active' : ''}">
      <td>
        <div class="prop-title">${escapeHtml(p.label)}</div>
        <div class="prop-sub">${escapeHtml(p.iri)}</div>
      </td>
      <td>${typeTag(p.type)}</td>
      <td>${escapeHtml(p.range || "—")}</td>
      <td><span class="tag">${escapeHtml(p.cardinality || "0..*")}</span></td>
      <td>${requirementTag(p.requirement)}</td>
      <td class="muted">${escapeHtml((p.source && p.source.from) ? p.source.from : "local")}</td>
    </tr>
  `).join("");

      container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Property</th>
          <th>Type</th>
          <th>Range</th>
          <th>Cardinality</th>
          <th>Requirement</th>
          <th>Source</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;

      container.querySelectorAll("tbody tr").forEach(row => {
        row.addEventListener("click", () => {
          selectedPropertyId = row.dataset.prop;
          renderDetailView();
          renderPropertyDetail();
        });
      });

      if (!selectedPropertyId && props.length) selectedPropertyId = props[0].id;
    }

    function tsTypeForProperty(prop) {
      const range = prop.range || "unknown";
      if (prop.type === "literal") {
        if (/decimal|integer|nonNegativeInteger/i.test(prop.rangeIri || "")) return "number";
        if (/duration|date|time/i.test(prop.rangeIri || "")) return "string";
        if (/hexBinary/i.test(prop.rangeIri || "")) return "string";
        return "string";
      }
      const cleaned = range.replace(/[^a-zA-Z0-9]/g, "");
      return cleaned || "unknown";
    }

    function toFieldName(label) {
      const text = (label || "").replace(/[^a-zA-Z0-9 ]/g, " ").trim();
      if (!text) return "field";
      const parts = text.split(/\s+/);
      return parts[0].toLowerCase() + parts.slice(1).map(p => p.charAt(0).toUpperCase() + p.slice(1)).join("");
    }

    function renderCodeView() {
      const cls = getSelectedClass();
      const props = getVisibleProperties(cls);
      const iface = cls.label.replace(/[^a-zA-Z0-9]/g, "");
      const lines = props.map(p => {
        const optional = (p.requirement || "optional").toLowerCase() === "mandatory" ? "" : "?";
        const baseType = tsTypeForProperty(p);
        const tsType = (p.cardinality || "").endsWith("*") ? `${baseType}[]` : baseType;
        return `  /** ${p.definition || p.label} */\n  ${toFieldName(p.label)}${optional}: ${tsType};`;
      }).join("\n\n");

      document.getElementById("codeView").innerHTML = `
    <div class="code-wrap">
      <pre>interface ${iface} {\n${lines || "  // No properties visible under current filters"}\n}</pre>
    </div>
  `;
    }

    function renderPropertyDetail() {
      const cls = getSelectedClass();
      const props = getVisibleProperties(cls);
      const prop = props.find(p => p.id === selectedPropertyId) || props[0];
      const panel = document.getElementById("propertyDetail");

      if (!prop) {
        panel.innerHTML = `<div class="detail-card"><div class="muted">Select a property from the list to inspect it here.</div></div>`;
        return;
      }

      const hierarchy = (prop.hierarchy || []).map(h => `<li>${escapeHtml(h.relation || "related")} → ${escapeHtml(h.label || h.iri || "")}</li>`).join("");

      panel.innerHTML = `
    <div class="detail-card">
      <h3>${escapeHtml(prop.label)}</h3>
      <div class="muted" style="font-size:12px; margin-top:-2px;">${escapeHtml(prop.iri)}</div>
      <p style="line-height:1.6; margin-top:8px;">${escapeHtml(prop.definition || "No definition available.")}</p>
    </div>

    <div class="detail-card">
      <div class="kv">
        <div class="k">Domain</div><div>${escapeHtml(prop.domain || "—")}</div>
      </div>
    </div>

    <div class="detail-card">
      <h4>Usage note</h4>
      <div class="muted" style="line-height:1.6;">${escapeHtml(prop.usageNote || "No usage note available.")}</div>
    </div>

    <div class="detail-card">
      <h4>Hierarchy</h4>
      ${hierarchy ? `<ul class="list pl-4 mt-2" style="list-style-type: disc; color: var(--muted);">${hierarchy}</ul>` : `<div class="muted">No hierarchy information available.</div>`}
    </div>
  `;
    }

    function renderTabs() {
      document.querySelectorAll(".tab").forEach(btn => {
        if (btn.dataset.tab === activeTab) {
          btn.classList.add("bg-primary-50", "border-primary-300", "text-primary-700");
          btn.classList.remove("bg-white", "text-gray-600");
        } else {
          btn.classList.remove("bg-primary-50", "border-primary-300", "text-primary-700");
          btn.classList.add("bg-white", "text-gray-600");
        }
      });
      document.getElementById("detailView").style.display = activeTab === "detail" ? "block" : "none";
      document.getElementById("codeView").style.display = activeTab === "code" ? "block" : "none";
    }

    function toggleClasses() {
      const list = document.getElementById("classList");
      const icon = document.getElementById("classesToggleIcon");
      if (list.style.display === "none") {
        list.style.display = "flex";
        icon.className = "fas fa-chevron-up";
      } else {
        list.style.display = "none";
        icon.className = "fas fa-chevron-down";
      }
    }

    function renderAll() {
      renderPrimer();
      renderFilters();
      renderClassList();
      renderContext();
      renderDetailView();
      renderCodeView();
      renderPropertyDetail();
      renderTabs();
    }

    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        activeTab = btn.dataset.tab;
        renderTabs();
      });
    });

    document.getElementById("searchInput").addEventListener("input", (e) => {
      filters.search = e.target.value;
      selectedPropertyId = null;
      renderAll();
    });

    document.getElementById("graphButton").addEventListener("click", () => {
      window.open("graph.html?spec=" + encodeURIComponent(DATA.specification.id), "_blank");
    });

    function initDocs() {
      selectedClassId = primerIds.find(id => DATA.classes.some(c => c.id === id)) || DATA.classes[0]?.id;
      renderSpecHeader();
      renderAll();
    }

    // Assign from global js file to bypass CORS locally
    DATA = DOCS_DATA;
    initDocs();

  </script>
</body>

</html>
