<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spec Explorer</title>
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#browse" aria-label="Spec Explorer home">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2 21 7v10l-9 5-9-5V7l9-5Zm0 2.3L5 8.2v7.6l7 3.9 7-3.9V8.2l-7-3.9Zm0 3.2 4 2.2v4.6l-4 2.2-4-2.2V9.7l4-2.2Z"/></svg>
          </span>
          <span>Spec Explorer</span>
        </a>

        <nav class="main-nav" aria-label="Primary navigation">
          <a class="nav-link active" href="#browse" data-route="browse">Browse</a>
          <a class="nav-link" href="#docs" data-route="docs">Docs</a>
          <a class="nav-link" href="#graph" data-route="graph">Graph</a>
          <a class="nav-link" href="#dev" data-route="dev">Dev Tools</a>
        </nav>

        <form class="global-search" id="globalSearchForm" role="search">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.5 4a6.5 6.5 0 0 1 5.16 10.45l4.45 4.44-1.42 1.42-4.44-4.45A6.5 6.5 0 1 1 10.5 4Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"/></svg>
          <input id="globalSearch" type="search" placeholder="Search specification, classes, properties..." autocomplete="off">
          <kbd>⌘K</kbd>
        </form>

        <div class="top-actions" aria-label="Application actions">
          <button class="icon-button" type="button" title="Reading mode" aria-label="Reading mode">
            <svg viewBox="0 0 24 24"><path d="M5 4h6a3 3 0 0 1 3 3v13a3 3 0 0 0-3-3H5V4Zm8.5 0H19v13h-6a2 2 0 0 0-1 .27V7a1 1 0 0 1 1-1h.5V4ZM7 6v9h4a5 5 0 0 1 1 .1V7a1 1 0 0 0-1-1H7Z"/></svg>
          </button>
          <button class="icon-button" type="button" title="History" aria-label="History">
            <svg viewBox="0 0 24 24"><path d="M12 5a7 7 0 1 1-6.32 4H3l3.5-3.5L10 9H7.84A5 5 0 1 0 12 7V5Zm1 3v4.2l3 1.8-1 1.73-4-2.4V8h2Z"/></svg>
          </button>
          <button class="icon-button" type="button" title="Help" aria-label="Help">
            <svg viewBox="0 0 24 24"><path d="M11 18h2v-2h-2v2Zm1-16a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm0 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16Zm0-14a3.5 3.5 0 0 0-3.5 3.5h2A1.5 1.5 0 1 1 12 11c-1.2 0-2 .8-2 2v1h2v-1c0-.2.1-.3.5-.5a3.5 3.5 0 0 0-.5-6.5Z"/></svg>
          </button>
          <button class="icon-button" type="button" title="Settings" aria-label="Settings">
            <svg viewBox="0 0 24 24"><path d="m19.43 12.98.04-.98-.04-.98 2.11-1.65-2-3.46-2.49 1a7.5 7.5 0 0 0-1.7-.98L15 3.25h-4l-.35 2.68c-.6.24-1.17.57-1.7.98l-2.49-1-2 3.46 2.11 1.65-.04.98.04.98-2.11 1.65 2 3.46 2.49-1c.53.41 1.1.74 1.7.98L11 20.75h4l.35-2.68c.6-.24 1.17-.57 1.7-.98l2.49 1 2-3.46-2.11-1.65ZM13 18.75h-2l-.27-2.04-.61-.22a5.4 5.4 0 0 1-1.49-.86l-.5-.4-1.9.76-1-1.73 1.62-1.27-.11-.63a5.5 5.5 0 0 1 0-1.72l.11-.63-1.62-1.27 1-1.73 1.9.76.5-.4c.45-.37.95-.66 1.49-.86l.61-.22L11 5.25h2l.27 2.04.61.22c.54.2 1.04.49 1.49.86l.5.4 1.9-.76 1 1.73-1.62 1.27.11.63a5.5 5.5 0 0 1 0 1.72l-.11.63 1.62 1.27-1 1.73-1.9-.76-.5.4c-.45.37-.95.66-1.49.86l-.61.22L13 18.75ZM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg>
          </button>
          <span class="avatar" aria-hidden="true">AB</span>
        </div>
      </header>

      <main id="app" class="app-main" tabindex="-1"></main>
    </div>

    <template id="browseTemplate">
      <section class="layout browser-page">
        <aside class="left-sidebar">
          <section class="side-section">
            <h2>Exploration</h2>
            <button class="side-item active" type="button">
              <svg viewBox="0 0 24 24"><path d="m12 3 9 5-9 5-9-5 9-5Zm5.85 12.02L12 18.27l-5.85-3.25L3 16.77l9 5 9-5-3.15-1.75Zm0-4L12 14.27l-5.85-3.25L3 12.77l9 5 9-5-3.15-1.75Z"/></svg>
              <span>Specification Browser</span>
            </button>
            <button class="side-item" type="button" data-panel-action="recent">
              <svg viewBox="0 0 24 24"><path d="M12 5a7 7 0 1 1-6.32 4H3l3.5-3.5L10 9H7.84A5 5 0 1 0 12 7V5Zm1 3v4.2l3 1.8-1 1.73-4-2.4V8h2Z"/></svg>
              <span>Recent Specifications</span>
            </button>
            <button class="side-item" type="button" data-panel-action="favorites">
              <svg viewBox="0 0 24 24"><path d="m12 3 2.72 5.51 6.08.88-4.4 4.29 1.04 6.05L12 16.87l-5.44 2.86 1.04-6.05-4.4-4.29 6.08-.88L12 3Z"/></svg>
              <span>Favorites</span>
            </button>
          </section>

          <section class="side-section">
            <div class="section-title-row">
              <h2>Specification Tree</h2>
              <span class="status-dot" title="Loaded"></span>
            </div>
            <div id="specTree" class="tree-list"></div>
          </section>

          <section class="side-section">
            <h2>Related Specifications</h2>
            <div id="relatedSpecs" class="related-list"></div>
          </section>

          <form id="sourceForm" class="source-form">
            <label for="sourceUrl">Input specification URL</label>
            <div class="source-input-row">
              <input id="sourceUrl" type="url" value="https://mff-uk.github.io/specifications/dcat-ap/" aria-label="Input specification URL">
              <button type="submit" title="Load specification">Load</button>
            </div>
          </form>
        </aside>

        <section class="canvas-area">
          <div class="page-heading">
            <div>
              <h1>Specification Browser</h1>
              <p>Discover and explore relationships between specifications and their components.</p>
            </div>
            <div class="view-switch" role="group" aria-label="View mode">
              <button class="active" type="button" data-view-mode="map">
                <svg viewBox="0 0 24 24"><path d="M9 18 3 21V6l6-3 6 3 6-3v15l-6 3-6-3Zm1-12.24v10.5l4 2V7.76l-4-2Zm-2 10.5V5.76l-3 1.5v10.5l3-1.5Zm8 2 3-1.5V6.24l-3 1.5v10.52Z"/></svg>
                Map
              </button>
              <button type="button" data-view-mode="list">
                <svg viewBox="0 0 24 24"><path d="M4 6h3v3H4V6Zm5 0h11v3H9V6Zm-5 5h3v3H4v-3Zm5 0h11v3H9v-3Zm-5 5h3v3H4v-3Zm5 0h11v3H9v-3Z"/></svg>
                List
              </button>
            </div>
          </div>

          <div class="browser-toolbar">
            <label class="select-label">
              <span>Layout</span>
              <select id="layoutSelect">
                <option value="auto">Auto</option>
                <option value="lineage">Lineage</option>
                <option value="compact">Compact</option>
              </select>
            </label>
            <!-- <label class="check-pill"><input id="showClasses" type="checkbox" checked> <span>Show Classes</span></label>
            <label class="check-pill"><input id="showProperties" type="checkbox" checked> <span>Show Properties</span></label> -->
            <label class="check-pill"><input id="showShapes" type="checkbox" checked> <span>Show Shapes</span></label>
            <button id="filterButton" class="toolbar-button" type="button">
              Filters
              <svg viewBox="0 0 24 24"><path d="M4 5h16l-6 7v5l-4 2v-7L4 5Z"/></svg>
            </button>
          </div>

          <div id="mapView" class="map-view">
            <div class="grid-canvas">
              <svg id="relationshipSvg" class="relationship-svg" viewBox="0 0 1000 650" preserveAspectRatio="none" aria-hidden="true"></svg>
              <div id="nodeLayer" class="node-layer"></div>
              <div class="canvas-controls" aria-label="Map controls">
                <button id="zoomIn" type="button" title="Zoom in">+</button>
                <button id="zoomOut" type="button" title="Zoom out">−</button>
                <button id="fitView" type="button" title="Fit view">
                  <svg viewBox="0 0 24 24"><path d="M4 4h6v2H6v4H4V4Zm10 0h6v6h-2V6h-4V4ZM6 14v4h4v2H4v-6h2Zm12 4v-4h2v6h-6v-2h4Z"/></svg>
                </button>
                <button id="lockCanvas" type="button" title="Lock layout">
                  <svg viewBox="0 0 24 24"><path d="M17 9h-1V7a4 4 0 0 0-8 0v2H7a2 2 0 0 0-2 2v8h14v-8a2 2 0 0 0-2-2Zm-7-2a2 2 0 0 1 4 0v2h-4V7Zm7 10H7v-6h10v6Z"/></svg>
                </button>
              </div>
              <div class="mini-map" aria-label="Mini map">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>
          </div>

          <div id="listView" class="list-view" hidden style="margin-top: 40px;">
            <div class="spec-table-wrap">
              <table class="spec-table">
                <thead>
                  <tr>
                    <th>Specification</th>
                    <th>Type</th>
                    <th>Status</th>
                    <th>Classes</th>
                    <th>Properties</th>
                    <th>Shapes</th>
                    <th>Source</th>
                  </tr>
                </thead>
                <tbody id="specTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <aside class="right-inspector" id="inspector"></aside>
      </section>
    </template>

    <template id="placeholderTemplate">
      <section class="placeholder-page">
        <div class="placeholder-panel">
          <span class="placeholder-icon" id="placeholderIcon"></span>
          <h1 id="placeholderTitle"></h1>
          <p id="placeholderText"></p>
          <a href="#browse" class="primary-link">Return to Specification Browser</a>
        </div>
      </section>
    </template>

    <script src="data/specifications.js"></script>
    <script src="src/app.js" defer></script>
  </body>
</html>
